*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans SC','Noto Sans',system-ui,sans-serif;
  background:var(--cream);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;text-wrap:pretty;
  transition:background 0.5s ease,color 0.5s ease;
  position:relative;z-index:0;margin:0;padding:0;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  transition:opacity 0.5s ease;
}

/* ===== CULTURAL THEMES ===== */
/* Korean — soft pastels, modern K-aesthetic, subtle lattice */
[data-theme="ko"]{
  --cream:#F9F6F2;--warm:#EDE8E2;--ink:#1C1C2E;
  --accent:#D4857B;--accent2:#7A8B8A;--gold:#C4A265;

}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;pointer-events:none
}
.topbar>*{pointer-events:auto}
.topbar .home-btn{
  background:var(--card-bg);border:1px solid var(--border);border-radius:10px;
  padding:8px 16px;font-size:0.82rem;color:var(--muted);cursor:pointer;
  font-family:inherit;transition:all 0.2s;box-shadow:var(--shadow)
}
.topbar .home-btn:hover{background:var(--warm);color:var(--ink)}
.topbar .lang-toggle{
  display:flex;gap:0;position:relative;z-index:60
}
/* Custom dropdown */
.lang-dropdown{position:relative;font-size:0.78rem}
.lang-selected{
  display:flex;align-items:center;gap:4px;
  padding:7px 12px;font-size:0.78rem;
  cursor:pointer;font-family:inherit;color:var(--ink);
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:10px;transition:all 0.2s;
  box-shadow:var(--shadow);white-space:nowrap
}
.lang-selected:hover{background:var(--warm)}
.lang-selected:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.lang-selected-text{min-width:0;overflow:hidden;text-overflow:ellipsis}
.lang-arrow{font-size:0.65rem;color:var(--muted);transition:transform 0.2s;margin-left:2px}
.lang-dropdown.open .lang-arrow{transform:rotate(180deg)}
.lang-menu{
  display:none;position:absolute;top:100%;right:0;margin-top:4px;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.12);
  min-width:160px;z-index:100;overflow:hidden;padding:4px 0
}
.lang-dropdown.open .lang-menu{display:block}
.lang-option{
  display:block;padding:8px 14px;font-size:0.78rem;
  cursor:pointer;font-family:inherit;color:var(--ink);
  transition:background 0.15s;white-space:nowrap
}
.lang-option:hover{background:var(--warm);color:var(--accent)}
/* Locale hint tooltip */
.locale-hint{
  position:absolute;top:100%;right:0;margin-top:8px;
  background:var(--ink);color:var(--cream);font-size:0.72rem;
  padding:6px 12px;border-radius:8px;white-space:nowrap;
  pointer-events:none;opacity:0;transform:translateY(-4px);
  transition:opacity 0.4s,transform 0.4s;z-index:99
}
.locale-hint::after{content:'';position:absolute;bottom:100%;right:24px;border:6px solid transparent;border-bottom-color:var(--ink)}
.locale-hint.show{opacity:0.92;transform:translateY(0)}
[dir="rtl"] .locale-hint::after{right:auto;left:24px}

/* ===== LOADING ===== */
#loading .loader{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--muted);margin-top:16px;font-size:0.9rem}

/* ===== INTRO ===== */
#intro{text-align:center;max-width:600px;margin:0 auto}
.intro-eyebrow{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--accent);margin-bottom:20px;font-weight:500;display:inline-block;min-height:1.2em}
#intro h1{
  font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.6rem);
  color:var(--ink);font-weight:700;line-height:1.15;margin-bottom:12px
}
#intro h1 span{color:var(--accent)}
#intro .desc{color:var(--muted);font-size:1.05rem;line-height:1.7;max-width:440px;margin:0 auto 32px;text-wrap:pretty}
.intro-cats-wrapper{position:relative;width:280px;height:260px;margin:0 auto 32px}
.intro-cats{position:relative;width:100%;height:100%}
.intro-cats::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 50% 48% at 50% 50%,var(--warm) 0%,transparent 100%);
  border-radius:50%;opacity:0.3;
}
.intro-cats img,.intro-cats .cat-item{
  position:absolute;width:34px;height:34px;border-radius:50%;
  object-fit:cover;border:2px solid #fff;box-shadow:var(--shadow);
  transition:transform 0.3s,opacity 0.4s;
  animation:pulse 2.5s ease-in-out infinite;cursor:pointer;z-index:1;
  transform:translate(-50%,-50%);
}
.intro-cats img:hover,.intro-cats .cat-item:hover{
  transform:translate(-50%,-55%) scale(1.25)!important;z-index:3;
}
.intro-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{
  padding:14px 48px;border:none;border-radius:var(--br,100px);font-size:1rem;
  font-weight:600;cursor:pointer;transition:all 0.3s;font-family:inherit;
  letter-spacing:0.02em
}
.btn-primary{background:var(--ink);color:var(--cream)}
.btn-primary:hover{background:#4A3D2A;transform:translateY(-1px);box-shadow:0 6px 24px rgba(44,36,22,0.14)}
.btn-secondary{background:transparent;border:2px solid var(--ink);color:var(--ink)}
.btn-secondary:hover{background:var(--warm)}
.intro-meta{color:var(--muted);font-size:0.82rem;margin-top:20px}
.dim-link{color:var(--accent);cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;transition:color 0.2s}
.dim-link:hover{color:var(--ink)}

/* ===== QUIZ ===== */
#quiz{text-align:center}
.quiz-progress{width:100%;max-width:480px;margin-bottom:28px}
.quiz-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.quiz-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease}
.quiz-count{color:var(--muted);font-size:0.8rem;margin-top:8px;text-align:right}
.quiz-card{
  background:var(--card-bg);border-radius:24px;padding:36px 32px;max-width:520px;
  width:100%;box-shadow:var(--shadow);border:1px solid var(--border);
  animation:slideIn 0.35s ease
}
@keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.quiz-q-emoji{font-size:2.5rem;margin-bottom:16px;display:block}
.quiz-q-text{font-size:1.15rem;line-height:1.7;margin-bottom:28px;color:var(--ink);font-weight:500}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{
  background:var(--cream);border:1.5px solid var(--border);color:var(--ink);
  padding:14px 18px;border-radius:14px;font-size:0.95rem;cursor:pointer;
  transition:all 0.22s;text-align:left;line-height:1.55;font-family:inherit
}
.quiz-opt:hover{background:var(--warm);border-color:var(--accent);transform:translateX(4px)}
.quiz-opt:active{transform:scale(0.985)}

/* ===== RESULT ===== */
#result{text-align:center;max-width:720px;margin:0 auto;padding-bottom:20px}
.result-hero{position:relative;width:100%;border-radius:24px;overflow:hidden;margin-bottom:16px;aspect-ratio:16/9;max-height:380px;box-shadow:var(--shadow)}
.result-hero img{width:100%;height:100%;object-fit:cover}
.result-hero-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.7));
  padding:40px 28px 24px;text-align:left
}
.result-hero-code{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:#fff;letter-spacing:0.04em}
.result-hero-name{color:rgba(255,255,255,0.85);font-size:1rem;margin-bottom:10px}
.result-hero-breed{color:rgba(255,255,255,0.7);font-size:0.85rem}
.result-match-pct{color:var(--gold);font-weight:700;font-size:1.3rem;margin-top:4px}

/* ===== TOP3 CAROUSEL ===== */
.top3-carousel{width:100%;max-width:400px;margin:20px auto 0;overflow:hidden;position:relative}
.top3-track{display:flex;transition:transform 0.5s cubic-bezier(.4,0,.2,1);will-change:transform}
.top3-slide{min-width:80%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:0 20px;box-sizing:border-box;transition:opacity 0.35s,transform 0.35s}
.top3-slide:not(.active-slide){transform:scale(0.92)}
.top3-slide.active-slide{opacity:1;transform:scale(1)}
.top3-avatar-wrap{position:relative;margin-bottom:16px;cursor:pointer;flex-shrink:0}
.top3-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid var(--accent);box-shadow:0 4px 24px rgba(44,36,22,0.15);transition:transform 0.3s}
.top3-avatar-wrap:active .top3-avatar{transform:scale(0.95)}
.top3-avatar-fallback{width:120px;height:120px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:3.2rem;border:4px solid var(--accent)}
.top3-pct-badge{position:absolute;bottom:-2px;right:-2px;background:var(--accent);color:#fff;border-radius:20px;padding:3px 10px;font-size:0.78rem;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.top3-slide-info{text-align:center;width:100%;overflow-y:auto;flex:1;padding:0 4px}
.top3-slide-code{font-size:1.15rem;font-weight:800;letter-spacing:0.04em}
.top3-slide-name{font-size:0.9rem;color:var(--muted);margin:2px 0 4px}
.top3-slide-breed{font-size:0.78rem;color:var(--accent2)}
.top3-slide-link{margin-top:14px;color:var(--accent);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;cursor:pointer;font-size:0.85rem;font-family:inherit;font-weight:500;transition:color 0.2s;background:none;border:none;padding:0}
.top3-slide-link:hover{color:var(--ink)}
.top3-paws{display:flex;justify-content:center;align-items:flex-end;gap:32px;margin-top:16px;position:relative;height:36px}
.paw-step{font-size:1rem;cursor:pointer;transition:all 0.4s cubic-bezier(.4,0,.2,1);position:relative;line-height:1;opacity:0.4}
.paw-step.paw-active{font-size:1.7rem;opacity:1;animation:pawBounce 0.5s ease}
.paw-step:not(.paw-active){filter:grayscale(0.5)}
@keyframes pawBounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-8px) scale(1.1)}50%{transform:translateY(-4px) scale(1.05)}100%{transform:translateY(0) scale(1)}}

.section-label{
  font-size:0.75rem;text-transform:uppercase;letter-spacing:0.15em;
  color:var(--muted);margin:24px 0 12px
}

.dim-section{width:100%;max-width:500px;margin:0 auto 20px}
.dim-row{display:flex;align-items:center;gap:12px;margin:10px 0}
.dim-label{width:55px;text-align:right;font-size:0.82rem;color:var(--muted)}
.dim-bar-wrap{flex:1;height:6px;background:var(--warm);border-radius:3px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.dim-val{width:70px;font-size:0.78rem;text-align:left;font-weight:600}

.fo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:560px;margin:0 auto 24px}
.fo-card{
  background:var(--card-bg);border-radius:16px;padding:18px;border:1px solid var(--border);
  box-shadow:var(--shadow)
}
.fo-card h4{font-size:0.85rem;margin-bottom:14px;font-weight:600}
.fo-item{display:flex;align-items:center;gap:10px;margin:8px 0;cursor:pointer;padding:6px;border-radius:10px;transition:background 0.2s}
.fo-item:hover{background:var(--warm)}
.fo-item img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.fo-item-code{font-size:0.82rem;font-weight:700}
.fo-item-name{font-size:0.78rem;color:var(--muted)}
.friend-label{color:var(--green)}.opponent-label{color:var(--red)}

.result-actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center}

/* ===== OVERVIEW ===== */
#overview{text-align:center;max-width:900px;margin:0 auto;padding-top:60px}
#overview h2{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:8px}
#overview .overview-sub{color:var(--muted);font-size:0.9rem;margin-bottom:28px}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;width:100%}
.ov-card{
  background:var(--card-bg);border-radius:16px;overflow:hidden;
  border:1px solid var(--border);box-shadow:var(--shadow);
  cursor:pointer;transition:all 0.3s;text-align:left
}
.ov-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(44,36,22,0.1)}
.ov-card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.ov-card-body{padding:12px 14px 14px}
.ov-card-code{font-size:0.78rem;font-weight:700;letter-spacing:0.03em}
.ov-card-name{font-size:0.82rem;color:var(--ink);margin:2px 0 4px;font-weight:600}
.ov-card-breed{font-size:0.72rem;color:var(--muted)}
.ov-card-group{font-size:0.68rem;color:var(--accent);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}
.overview-filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.ov-filter{
  padding:6px 16px;border:1.5px solid var(--border);border-radius:20px;
  background:transparent;font-size:0.8rem;cursor:pointer;font-family:inherit;
  transition:all 0.2s;color:var(--muted)
}
.ov-filter:hover{color:var(--ink);border-color:var(--accent)}
.ov-filter.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* ===== MODAL (type detail) ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,0.6);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal-box{
  background:var(--card-bg);border-radius:24px;padding:0;max-width:460px;width:100%;
  max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(44,36,22,0.18)
}
.modal-img{width:100%;aspect-ratio:16/9;object-fit:cover}
.modal-body{padding:24px 28px 28px}
.modal-close{position:sticky;top:0;float:right;background:rgba(255,255,255,0.9);border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;margin:12px 12px -36px 0;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center}
.modal-code{font-size:1.4rem;font-weight:800;color:var(--accent);letter-spacing:0.04em}
.modal-name{color:var(--muted);font-size:0.95rem;margin:4px 0}
.modal-breed{color:var(--accent2);font-size:0.85rem;margin-bottom:6px}
.modal-group{font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}
.modal-desc{color:#5A4F3F;line-height:1.75;font-size:0.93rem;margin-bottom:16px}
.modal-mbti{background:var(--warm);padding:8px 14px;border-radius:10px;display:inline-block;font-size:0.85rem;margin-bottom:16px}
.modal-traits{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.trait-pill{padding:4px 14px;background:var(--warm);border-radius:20px;font-size:0.78rem;color:var(--accent)}
.modal-fo h4{font-size:0.82rem;color:var(--muted);margin-bottom:6px}

/* ===== QR MODAL ===== */
.qr-modal-box{text-align:center;padding:32px 24px 28px}
.qr-modal-box .qr-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:3px solid var(--accent);box-shadow:var(--shadow)}
.qr-modal-box .qr-title{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:6px}
.qr-modal-box .qr-desc{color:var(--muted);font-size:0.85rem;margin-bottom:20px;line-height:1.6}
.qr-modal-box .qr-canvas{margin:0 auto 8px;display:block;image-rendering:pixelated}
.qr-modal-box .qr-url{font-size:0.75rem;color:var(--muted);word-break:break-all}

/* ===== DIMENSIONS POPUP ===== */
.dim-popup-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,0.55);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.dim-popup-overlay.active{display:flex}
.dim-popup-box{background:var(--card-bg);border-radius:24px;padding:0;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(44,36,22,0.18);animation:popIn 0.35s ease;position:relative}
@keyframes popIn{from{opacity:0;transform:scale(0.92) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dim-popup-head{padding:28px 28px 0}
.dim-popup-head h3{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--ink);margin-bottom:4px}
.dim-popup-head .dim-popup-sub{color:var(--muted);font-size:0.85rem;line-height:1.6}
.dim-popup-close{position:absolute;top:16px;right:16px;background:var(--warm);border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:2}
.dim-popup-body{padding:20px 28px 28px}
.dim-card{background:var(--warm);border-radius:16px;padding:18px;margin:10px 0;transition:transform 0.2s;border-left:4px solid var(--gold)}
.dim-card:nth-child(2){border-left-color:#C4734F}
.dim-card:nth-child(3){border-left-color:#5B8C5A}
.dim-card:nth-child(4){border-left-color:#6B5E4A}
.dim-card:nth-child(5){border-left-color:#B8860B}
.dim-card-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dim-card-icon{font-size:1.6rem}
.dim-card-title{font-weight:700;font-size:0.95rem;color:var(--ink)}
.dim-card-sub{font-size:0.78rem;color:var(--muted);margin-left:auto;white-space:nowrap}
.dim-card-desc{font-size:0.85rem;color:#5A4F3F;line-height:1.65}
.dim-card-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.dim-tag{padding:3px 10px;background:var(--card-bg);border-radius:12px;font-size:0.72rem;color:var(--accent);font-weight:500}

/* ===== FALLBACK ===== */
.cat-fallback{display:flex;align-items:center;justify-content:center;background:var(--warm);color:var(--accent2);font-size:3rem}
.cat-fallback.sm{font-size:1.5rem;width:36px;height:36px;border-radius:50%}
.intro-cats .cat-fallback.sm{font-size:1.2rem;width:34px;height:34px;border-radius:50%;position:absolute}

/* ===== TYPING CURSOR ===== */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:3px;vertical-align:text-bottom;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== INTRO CATS PULSE ===== */
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}

/* ===== WHISKERS ===== */
.whiskers-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:2;
}
.whisker{
  position:absolute;
  width:0;height:0;
  opacity:0;
  transform-origin:0% 50%;
  animation:whiskerBloom 2.5s ease-out infinite;
  animation-delay:var(--delay,0s);
}
.whisker svg{
  position:absolute;left:0;top:-10px;
  width:var(--len,90px);height:20px;
  overflow:visible;
}
.whisker path{
  stroke:var(--accent);
  fill:none;
  stroke-linecap:round;
}
@keyframes whiskerBloom{
  0%{opacity:0;transform:rotate(var(--angle,0deg))}
  25%{opacity:0.9;transform:rotate(var(--angle,0deg))}
  50%{opacity:0.7;transform:rotate(var(--angle,0deg))}
  100%{opacity:0;transform:rotate(var(--angle,0deg))}
}

@media(max-width:600px){
  #intro h1{font-size:2rem}
  .intro-cats img,.intro-cats .cat-item{width:28px;height:28px;border-width:1.5px}
  .intro-cats .cat-fallback.sm{width:28px!important;height:28px!important;font-size:1rem!important}
  .intro-eyebrow{font-size:0.7rem}
  .desc{font-size:0.92rem;line-height:1.6}
  .btn{padding:14px 32px;font-size:0.92rem}
  .top3-carousel{max-width:340px}
  .top3-slide{min-width:85%;padding:0 12px}
  .top3-slide:not(.active-slide){transform:scale(0.9)}
  .top3-avatar{width:100px;height:100px}
  .top3-avatar-fallback{width:100px;height:100px;font-size:2.5rem}
  .top3-paws{gap:24px}
  .fo-grid{grid-template-columns:1fr}
  .quiz-card{padding:24px 20px}
  .result-hero{max-height:240px;aspect-ratio:4/3}
  .result-actions{gap:8px}
  .result-actions .btn{padding:12px 24px;font-size:0.85rem}
  .overview-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .dim-popup-box,.modal-box{max-width:95vw}
  .modal-body{padding:16px 18px 20px}
  .home-btn{padding:6px 12px;font-size:0.75rem}
  .intro-actions{flex-direction:column;width:100%;max-width:280px}
  .intro-actions .btn{width:100%}
  .whisker svg{width:calc(var(--len,90px)*.55)!important}
  footer{font-size:0.8rem;padding:1rem}
}

<script>
// ===== PAGE VIEW COUNTER (unique visitors) =====
// Page views counter — api.counterapi.dev
let _viewsCache = null;
let _viewsCounted = false; // track if we've already incremented this session

function animateCount(el,from,to,duration){
  if(from===to){el.textContent='x'+to.toLocaleString();return}
  const start=performance.now();
  function tick(now){
    const p=Math.min((now-start)/duration,1);
    const eased=1-Math.pow(1-p,3);
    const cur=Math.round(from+(to-from)*eased);
    el.textContent='x'+cur.toLocaleString();
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function initPageViews(){
  const el=document.getElementById('viewCount');
  if(!el)return;
  if(_viewsCache!==null){animateCount(el,0,_viewsCache,1200);return}
  el.textContent='x...';
  const API='https://api.counterapi.dev/v1/catpersona/views/';

  function handleCount(n){
    if(n==null||isNaN(n))n=0;
    _viewsCache=n;
    animateCount(el,0,n,1200);
  }

  // First call in this session: increment counter, then fetch total
  if(!_viewsCounted){
    _viewsCounted=true;
    fetch(API+'up',{cache:'no-store'})
      .then(r=>r.ok?r.json():Promise.reject())
      .then(d=>{
        const n=d.count!=null?Number(d.count):0;
        handleCount(n);
      })
      .catch(()=>{
        // Fallback: just read without incrementing
        fetch(API,{cache:'no-store'})
          .then(r=>r.ok?r.json():Promise.reject())
          .then(d=>handleCount(d.count))
          .catch(()=>handleCount(0));
      });
  }else{
    // Subsequent calls (language switch): just read
    fetch(API,{cache:'no-store'})
      .then(r=>r.ok?r.json():Promise.reject())
      .then(d=>handleCount(d.count))
      .catch(()=>handleCount(0));
  }
}

function setLang(l){
  LANG=l;

  var dd=document.getElementById('langDropdown');
  if(dd){
    var opts=dd.querySelectorAll('.lang-option');
    for(var i=0;i<opts.length;i++){
      var onclick=opts[i].getAttribute('onclick')||'';
      if(onclick.indexOf('setLang('+"'"+l+"'"+')')>-1){
        var txt=opts[i].textContent.trim();
        var sTxt=dd.querySelector('.lang-selected-text');
        if(sTxt)sTxt.textContent=txt;
        break;
      }
    }
  }
  document.documentElement.setAttribute('data-theme',l);
  document.documentElement.lang = l==='zh'?'zh-CN':l==='hk'?'zh-HK':l==='ja'?'ja-JP':l==='ko'?'ko-KR':l==='fr'?'fr-FR':l==='es'?'es-ES':l==='ru'?'ru-RU':l==='ar'?'ar-SA':'en';

  localStorage.setItem('cati_lang',l);
}

  if(twd)twd.setAttribute('content',(SEO_DESCS[l]||SEO_DESCS.en).substring(0,200));

  try{var u=new URL(window.location);u.searchParams.set('lang',l);window.history.replaceState({},'',u.toString())}catch(e){}
}

      {e:'💻',t:'人类在电脑前工作。你决定……',o:['坐在键盘上。你的屁股比他们的工作重要','坐在他们腿上，呼噜呼噜呼噜','在旁边的椅子上看着他们，偶尔用眼神提醒他们该休息了','完全不管，自己找个有阳光的舒适位置睡觉']},
      {e:'🐟',t:'关于你的日常作息，以下哪句话最符合你？',o:['我每天精确在同一时间做同一件事——规律是我的中间名','我完全没规律，人类永远猜不到我下一秒要干什么','我有一套规律作息，但偶尔会因为心情改变计划','什么是作息？我只听从内心的呼唤']},
      {e:'🪶',t:'你拿到一根逗猫棒。接下来会发生什么？',o:['后空翻！飞扑！撕咬！这是狩猎！这是生命！','用爪子轻轻拍一下，然后走开——太幼稚了','静静地盯着看，计算最佳扑击角度，然后精准出击','假装不感兴趣，但趁人类不注意时偷偷去碰一下']},
      {e:'🏠',t:'你和你的人类之间的关系是……',o:['我是老板，他们是我的仆人。我们的关系很健康（对他们来说）','我们是灵魂伴侣，我需要他们，他们也需要我','我们是室友。我偶尔允许他们摸我，但他们得先通过安检','人类？什么是人类？我只知道那个每天给我放食物的两脚兽']}
    ]
  },

    localeHint:'언어를 바꾸면 깜짝 놀랄 거예요 ✨',
    typeInfo:{LCQAK:{name:'엘리트 선수',breed:'벵골 고양이',desc:'운동선수처럼 조용하고 규칙적인 삶. 벽을 오르는 동안 아무 소리도 내지 않는다. 일상은 시계처럼 정확하다.'},LCQGK:{name:'매운 달콤이',breed:'삼색 고양이',desc:'사랑이 넘치지만 성질도 넘친다. 규칙적인 삶 속에 숨은 시한폭탄. 방금까지 애교 부리다가 배 만졌다고 물어버리는 게 일상.'},LCVAK:{name:'쇼스토퍼',breed:'샴 고양이',desc:'외향적이고 시끄럽고 끊임없이 활동적. 매일 같은 시간 같은 장소에서 같은 공연을 한다. 무시당하는 건 절대 못 참는다.'},LCVGK:{name:'드라마틱 점착제',breed:'치즈 고양이',desc:'먹을 것과 사랑에 집착한다. 주인에게 오렌지색 풀처럼 달라붙어 산다. 통조림 따는 소리만 들리면 깊은 잠에서도 튀어나간다.'},LCVAW:{name:'거대 연기파',breed:'메인쿤',desc:'덩치는 산만한데 마음은 강아지. 사자 갈기를 휘날리며 오늘은 껴안고 내일은 소리 지르고 모레는 식탁 위를 점령한다. 감정은 언제나 예고 없이 찾아온다.'},LMQAK:{name:'황금 귀족',breed:'골든 쉐이드',desc:'우아함 그 자체. 매일 같은 햇살 아래서 황금빛 털을 반짝이며 낮잠을 즐긴다. 삶의 질에 대한 기준이 매우 높다.'},LMQGK:{name:'복실복실 소울메이트',breed:'래그돌',desc:'달콤하고 평화로운 규칙러. 매일 정해진 시간에 안아달라고 조른다. 안기면 사랑에 녹아서 축 늘어져 버린다.'},LMQAW:{name:'은빛 방랑자',breed:'아메리칸 쇼트헤어',desc:'차분해 보이지만 속마음은 제멋대로. 오늘 소파에서 빈둥대다 내일 새벽 3시에 책장 위에서 물컵을 떨어뜨린다. 그리고 가장 순수한 눈빛으로 바라본다.'},LMVAK:{name:'수다스러운 룸메이트',breed:'리화 고양이',desc:'똑똑하고 말 많고 규칙적. 중국 길거리의 전설. 매일 같은 자리에서 회의를 열어 메뉴와 날씨와 옆집 고양이 뒷담화를 한다.'},LMVGK:{name:'왕실의 조언자',breed:'흰올빼미',desc:'조용하고 지혜롭고 규칙적. 흰올빼미처럼 매일 같은 시간에 조용히 나타나 평온한 기운을 뿌린다.'},LMVGW:{name:'벨벳 함정',breed:'스코티시 폴드',desc:'귀여움으로 속여 통조림을 따게 한 다음, 포크 대신 숟가락을 썼다고 그릇을 바닥에 던져버린다. 기분 변화는 0.1초다.'},SCQAK:{name:'침묵의 사냥꾼',breed:'노르웨이 숲 고양이',desc:'위엄 있고 독립적인 규칙러. 매일 정원을 순찰하는 자연의 수호자. 나무도 잘 타는데 자랑은 절대 안 한다.'},SCQGK:{name:'유령 장난꾸러기',breed:'오드아이 화이트',desc:'신비롭고 장난기 넘치고 규칙적. 오드아이가 반짝이고 새벽 4시면 장난 시작. 탁상 스탠드를 넘어뜨리고 유령처럼 사라진다.'},SCQAW:{name:'고독한 방랑자',breed:'마운틴 라이온',desc:'독립적이고 당당하며 예측 불가. 퓨마처럼 야생을 조용히 가로지른다. 나타날 땐 위압감, 사라질 땐 흔적조차 없다.'},SCVAK:{name:'길들여지지 않은 무법자',breed:'사바나 캣',desc:'독립적이고 지배적이며 규칙적. 매일 같은 시간에 영토를 순찰하며 집의 규칙을 정한다. 온 세상이 내 정글이다.'},SCVGK:{name:'거리의 전설',breed:'레서판다',desc:'날카롭고 거리에서 단련된 규칙러. 매일 정해진 시간에 영역 점검을 나간다. 호기심과 계산이 섞인 눈빛으로 모든 것을 관찰한다.'},SCVAW:{name:'사바나의 번개',breed:'서벌',desc:'키 크고 날렵하며 바람처럼 움직인다. 오늘은 창가에서 사냥 곡예, 내일은 소파 뒤에 숨어 2미터 점프. 호기심 끝이 없고 관심사는 바람 따라 바뀐다.'},SMQAK:{name:'쿨한 철학자',breed:'브리티시 쇼트헤어',desc:'느긋하고 독립적이며 규칙적. 매일 같은 자리에서 멍 때리기의 달인. 침착해 계속 가자의 살아있는 증거.'},SMQGK:{name:'궁극의 집돌이',breed:'페르시안',desc:'편안함의 정점. 매일 정해진 시간에 수면 자세만 바꾼다. 변화는 싫고 폭신한 베개만 있으면 세상 부러울 게 없다.'},SMQAW:{name:'설산의 은둔자',breed:'눈표범',desc:'고요하고 차갑게 자기 뜻대로만 나타난다. 가장 보기 힘든 고양이. 나타날 땐 묵직한 존재감, 사라질 땐 침묵.'},SMQGW:{name:'잠자는 용',breed:'자이언트 판다',desc:'집돌이에 조용하다가 가끔 폭발. 3주마다 새벽 3시에 전속력 질주 후 아무 일 없었다는 듯 다시 잠든다.'},SMVAK:{name:'괴짜 예술가',breed:'카우 캣',desc:'턱시도를 입고 가장 엉뚱한 짓을 한다. 매일 같은 시간에 예술 행위 - 물컵을 발로 치고 야간 창작 활동. 사회적 규칙? 그게 뭐죠?'},SMVGK:{name:'우아한 그림자',breed:'블랙 캣',desc:'신비롭고 은밀한 규칙러. 그림자처럼 정시에 나타났다 사라진다. 오직 한 사람에게만 부드러운 목소리를 들려준다.'},SMVAW:{name:'검은 귀 유령',breed:'카라칼',desc:'독립적이고 민감하며 추적 불가. 검은 귀 술은 마치 안테나 - 항상 수신 중, 항상 사라질 준비. 감정을 다 쏟아내고는 아무 일 없었다는 듯.'}},

    typeInfo:{LCQAK:{name:'エリートアスリート',breed:'ベンガル',desc:'運動神経抜群で静かな規律派。壁を音もなく登り、精密機械のように動く。生活リズムは時計より正確。'},LCQGK:{name:'スパイシースウィート',breed:'三毛猫',desc:'愛情たっぷりなのに気性が激しい。規則正しい日常に潜む時限爆弾。さっきまでスリスリしてたのに、お腹を触ったらガブリ。'},LCVAK:{name:'ショーストッパー',breed:'シャム猫',desc:'社交的でおしゃべり、とにかく目立ちたがり。毎日同じ時間同じ場所で同じショー。無視されるのが何より嫌い。'},LCVGK:{name:'ドラマチック接着剤',breed:'茶トラ',desc:'食いしん坊でベッタリ。オレンジ色の接着剤のように飼い主に貼りつく。缶詰の音がしたら熟睡中でも飛び起きる。'},LCVAW:{name:'巨大演技派',breed:'メインクーン',desc:'デカくてフワフワ、気分屋の王様。今日は抱っこ、明日は文句、明後日は食卓占拠。感情はいつも突然に。'},LMQAK:{name:'黄金の貴族',breed:'ゴールデンシェード',desc:'優雅で気高い規律派。毎日同じ陽だまりで金色の毛を輝かせて昼寝。生活の質に一切の妥協なし。'},LMQGK:{name:'ふわふわソウルメイト',breed:'ラグドール',desc:'甘くて平和主義のルーティン派。毎日決まった時間に抱っこを要求。抱かれると愛でとろけてデレデレに。'},LMQAW:{name:'銀の漂流者',breed:'アメリカンショートヘア',desc:'落ち着いて見えて実は完全に気まま。今日は一日中ソファ、明日は深夜3時に本棚からコップを落とす。そして無垢な目で見つめてくる。'},LMVAK:{name:'おしゃべりルームメイト',breed:'狸花猫',desc:'賢くておしゃべりでルーティン命。中国の路地裏レジェンド。毎日同じ場所で会議を開き、今日のメニューと天気と隣の猫の噂話を議論する。'},LMVGK:{name:'王家の相談役',breed:'シロフクロウ',desc:'静かで賢明なルーティン派。シロフクロウのように毎日同じ時間に静かに現れ、穏やかな空気を運ぶ。'},LMVGW:{name:'ベルベットの罠',breed:'スコティッシュフォールド',desc:'可愛さで騙して缶詰を開けさせ、フォークじゃなくてスプーンを使ったからと皿を床に落とす。気分の変化は一瞬。'},SCQAK:{name:'沈黙の狩人',breed:'ノルウェージャンフォレスト',desc:'威厳があり独立心旺盛なルーティン派。毎日時間通りに庭をパトロールする自然の守護者。木登り名人、でも自慢はしない。'},SCQGK:{name:'幻のいたずら師',breed:'オッドアイホワイト',desc:'神秘的でいたずら好き。オッドアイがキラリ、午前4時ちょうどにいたずら開始。電気スタンドを倒して幽霊のように消える。'},SCQAW:{name:'荒野の一匹狼',breed:'ピューマ',desc:'独立不羈の存在。ピューマのように荒野を静かに横切る。現れるときは圧倒的、消えるときは足跡さえ残さない。'},SCVAK:{name:'手に負えない異端児',breed:'サバンナキャット',desc:'独立心が強く支配的。毎日同じ時間に縄張りをパトロールし、家のルールを決める。この世界は全部ジャングルだ。'},SCVGK:{name:'街角の伝説',breed:'レッサーパンダ',desc:'鋭くてストリートスマートなルーティン派。毎日決まった時間に縄張りチェック。好奇心と計算が入り混じった目で全てを見ている。'},SCVAW:{name:'サバンナの稲妻',breed:'サーバル',desc:'背が高く俊敏、風のように動く。今日は窓辺でハンティング曲芸、明日はソファの裏から2メートルジャンプ。好奇心は尽きず、興味は風まかせ。'},SMQAK:{name:'クールな哲学者',breed:'ブリティッシュショートヘア',desc:'のんびり独立心旺盛なルーティン派。毎日同じ場所でボーッとする達人。落ち着け進めの生きたお手本。'},SMQGK:{name:'究極のインドア派',breed:'ペルシャ',desc:'くつろぎの頂点。毎日決まった時間に寝返りを打つだけ。変化は嫌い、ふわふわ枕さえあれば人生最高。'},SMQAW:{name:'雪山の隠者',breed:'ユキヒョウ',desc:'静かで孤高、自分のタイミングでしか姿を見せない。最も目撃が難しい猫。現れるときは圧倒的な存在感、消えるときは沈黙。'},SMQGW:{name:'眠れる龍',breed:'ジャイアントパンダ',desc:'インドア派で静か、でもたまに爆発。3週間に一度、深夜3時に全力疾走して何事もなかったようにまた眠る。'},SMVAK:{name:'変わり者のアーティスト',breed:'白黒猫',desc:'タキシードを着て一番おかしなことをする。毎日同じ時間に芸術活動 - コップを前足で倒し、夜間に創作。社会のルール？知らないね。'},SMVGK:{name:'優雅な影',breed:'黒猫',desc:'神秘的でプライベート重視。影のように定刻に現れては消える。たった一人だけに優しい声を聞かせる。'},SMVAW:{name:'黒耳の幻',breed:'カラカル',desc:'独立的で繊細、追跡不能。黒い耳房はまるでアンテナ - 常に受信中で常に消える準備完了。感情を全部出し切って、何事もなかったかのように。'}},

      {e:'🍽️',t:'フードボウルが15%空になりました。この危機をどう伝えますか？',o:['ボウルの横に立って、人間が来るまで最大音量で鳴き叫びます','ボウルの横に静かに座り、人間の魂を見つめて罪悪感を抱かせます','人間に近づいてそっと足に触れ、ボウルまで案内します','まあ、別にお腹空いてないし。人間がくれるならくれるでいい']},

      {e:'🧹',t:'飼い主が掃除機を出しました。あなたの反応は？',o:['ベッドの下に隠れます — このうるさいモンスターが消えるまで何時間もかかるかも','恐怖より好奇心が勝ちます — 安全な距離からこの物体を観察します','完全に無視して寝続けます。掃除機って何？','掃除機にシャーッと威嚇して追い払おうとします']},
      {e:'⏰',t:'午前3時です。あなたのエネルギーレベルは？',o:['ZOOMIES!!! 全速力で走り、棚に飛び乗り、水のコップを倒します — これこそ人生！','温かい人間の隣で丸くなって、静かにゴロゴロ','起きて伸びをして、台所のフードボウルをチェック（そしてまた寝ます）','片目を開けて様子を見て、うるさすぎると判断してまた寝ます']},
      {e:'📦',t:'飼い主が新しい段ボール箱を家に持ち帰りました。どうしますか？',o:['0.5秒以内に箱を占領し、近づこうとする生き物にシャーッと威嚇','まず観察します — 安全？他の猫の匂いがする？1日待ってから入ります','すぐに飛び込んで挟まり、無垢な目で人間を見つめます','つまらない。この箱は前のより良くない。完全に無関心']},
      {e:'👥',t:'知らない人が家に来ました。最初の反応は？',o:['すぐに駆け寄って大きな鳴き声で挨拶し、撫でてと要求します','姿を消します。安全だと感じたら出てきます — 数時間か数日かかるかも','家具の後ろから覗いて、この人の脅威レベルを評価します','自分のことを続けますが、片目でずっと監視しています']},
      {e:'💻',t:'飼い主がノートパソコンで仕事をしています。あなたは…',o:['キーボードの上に座ります。あなたのお尻の方が仕事より大事です','膝の上に座ってゴロゴロゴロゴロ','横の椅子から見守り、時々「休憩して」という目線を送ります','完全に無視して、日当たりの良い場所を見つけて昼寝します']},
      {e:'🐟',t:'あなたの日課を最もよく表す文は？',o:['毎日正確に同じ時間に同じことをします — ルーティンは私の代名詞','全くルーティンがありません — 飼い主は私が次に何をするか全く予測できません','ルーティンはあるけど、気分によってたまに予定を変えます','ルーティンって何？心の赴くままに動くだけ']},
      {e:'🪶',t:'羽根の釣り竿おもちゃをもらいました。次に何が起きますか？',o:['バク宙！飛びかかる！噛みつく！これこそ狩りだ！人生だ！','前足でそっと一回叩いて立ち去ります — 子供っぽすぎる','静かに見つめて最適な飛びかかり角度を計算し、精密に攻撃','興味ないふりをして、人間が見てない時にこっそり触ってみる']},
      {e:'🏠',t:'あなたと人間の関係は…',o:['私がボスで彼らは召使い。私たちの関係は健全です（彼らにとっては）','私たちはソウルメイト — 私には彼らが必要で、彼らにも私が必要','私たちはルームメイト。たまにセキュリティチェックをパスしたら撫でるのを許可','人間？人間って何？私はエサをくれる二足歩行の生き物しか知らない']}
    ]
  },

    typeInfo:{LCQAK:{name:'L\'Athlete d\'Elite',breed:'Bengal',desc:'Athletique, silencieux, routinier. Escalade les murs sans un bruit. Execute des mouvements difficiles avec une precision chirurgicale.'},LCQGK:{name:'La Douceur Piquante',breed:'Calico',desc:'Plein d\'amour mais le caractere bien trempe. Une bombe a retardement dans une vie autrement routiniere. Un calin puis une morsure, sans preavis.'},LCVAK:{name:'La Star de la Scene',breed:'Siamois',desc:'Extraverti, bruyant, hyperactif. Donne le meme spectacle a la meme heure chaque jour. Ne supporte pas d\'etre ignore.'},LCVGK:{name:'Le Velcro Dramatique',breed:'Tabby Orange',desc:'Obsede par la bouffe, collant, routinier. Se colle comme de la colle orange. Le bruit d\'une boite le fait bondir du plus profond sommeil.'},LCVAW:{name:'La Grande Diva',breed:'Maine Coon',desc:'Massif, duveteux, totalement imprevisible. Criniere de lion et presence royale, mais suit son humain comme un petit chien. Calins aujourd\'hui, drames demain.'},LMQAK:{name:'Le Noble Dore',breed:'Golden Shaded',desc:'Elegant, noble, routinier. Fait la sieste dans le meme rayon de soleil, son pelage dore scintillant.'},LMQGK:{name:'L\'Ame Soeur Duveteuse',breed:'Ragdoll',desc:'Doux, paisible, routinier. Exige des calins a la meme heure. Devient completement mou d\'affection quand on le porte.'},LMQAW:{name:'Le Flaneur Argente',breed:'American Shorthair',desc:'Calme en surface, totalement imprevisible. Passe la journee sur le canape, puis renverse ton verre a 3h du matin avec les yeux les plus innocents.'},LMVAK:{name:'Le Coloc Bavard',breed:'Li Hua',desc:'Intelligent, bavard, routinier. La legende des rues chinoises. Tient des reunions quotidiennes au meme endroit pour discuter du menu.'},LMVGK:{name:'Le Confident Royal',breed:'Harfang des Neiges',desc:'Silencieux, sage, routinier. Apparait silencieusement comme une chouette a la meme heure, apportant une presence apaisante.'},LMVGW:{name:'Le Piege de Velours',breed:'Scottish Fold',desc:'Utilise sa mignonnerie pour obtenir ce qu\'il veut, puis te punit d\'avoir utilise une fourchette au lieu d\'une cuillere.'},SCQAK:{name:'Le Chasseur Silencieux',breed:'Norvegien',desc:'Majestueux, independant, routinier. Patrouille le jardin a la meme heure, le gardien silencieux de la nature.'},SCQGK:{name:'Le Farceur Fantome',breed:'Blanc aux Yeux Vairons',desc:'Mysterieux, espiegle, routinier. Les yeux vairons brillent, les farces commencent a 4h pile. Renverse une lampe, disparait comme un fantome.'},SCQAW:{name:'Le Solitaire des Etendues',breed:'Puma',desc:'Independant, puissant, imprevisible. Traverse la nature comme un puma, silencieux, sans laisser de trace. N\'obeit qu\'a lui-meme.'},SCVAK:{name:'L\'Indomptable',breed:'Savannah',desc:'Independant, dominant, routinier. Patrouille son territoire a la meme heure, etablissant les regles de la maison. Le monde entier est sa jungle.'},SCVGK:{name:'La Legende des Rues',breed:'Panda Roux',desc:'Vif, debrouillard, routinier. Verifie son territoire a la meme heure avec un melange de curiosite et de calcul.'},SCVAW:{name:'L\'Eclair de la Savane',breed:'Serval',desc:'Grand, agile, se deplace comme le vent. Les plus longues jambes de tous les felins. Acrobaties de chasse aujourd\'hui, embuscade demain.'},SMQAK:{name:'Le Philosophe Cool',breed:'British Shorthair',desc:'Decontracte, independant, routinier. Zenifie au meme endroit chaque jour, l\'incarnation du reste calme et continue.'},SMQGK:{name:'Le Roi du Canape',breed:'Persan',desc:'La detente a son apogee. Change de position de sommeil a la meme heure. Deteste le changement, adore les coussins moelleux.'},SMQAW:{name:'L\'Ermite des Cimes',breed:'Leopard des Neiges',desc:'Calme, distant, n\'apparait qu\'a ses propres conditions. Le felin le plus insaisissable au monde.'},SMQGW:{name:'Le Dragon Endormi',breed:'Panda Geant',desc:'Casaniere, silencieuse, parfois explosive. Toutes les trois semaines, sprint a 3h du matin puis retour au sommeil comme si de rien n\'etait.'},SMVAK:{name:'L\'Artiste Excentrique',breed:'Chat Vache',desc:'En smoking, cause le chaos le plus creatif. Performances artistiques quotidiennes, renverse des verres, cree la nuit.'},SMVGK:{name:'L\'Ombre Elegante',breed:'Chat Noir',desc:'Mysterieux, prive, routinier. Apparait et disparait comme une ombre a l\'heure pile. De doux trilles reserves a une seule personne.'},SMVAW:{name:'Le Fantome aux Oreilles Noires',breed:'Caracal',desc:'Independant, sensible, impossible a suivre. Ces touffes d\'oreilles noires sont des antennes, toujours a l\'ecoute, toujours pret a disparaitre.'}},

    questions:[
      {e:'🛋️',t:'Votre humain s\'assoit sur le canapé. Que faites-vous ?',o:['Sauter immédiatement sur sa poitrine, ronronner fort et bloquer l\'écran','Le regarder depuis l\'autre bout de la pièce — profiter de sa compagnie à distance respectueuse','Marcher jusqu\'à lui et s\'asseoir à ses pieds — ni trop près, ni trop loin','L\'ignorer complètement, continuer à dormir, mais remuer le bout de la queue pour montrer qu\'on a remarqué']},
      {e:'🐭',t:'Une souris en jouet roule sur le parquet. Votre réaction ?',o:['Faire un salto arrière, déraper sur le tapis et la déchiqueter !','La regarder passer, cligner lentement des yeux et retourner à la sieste','Traquer silencieusement, s\'accroupir, puis bondir sans un bruit — mode chasse activé','Faire semblant de ne pas l\'avoir vue, mais vos oreilles pivotent et votre queue commence à frétiller']},
      {e:'🍽️',t:'Votre gamelle est vide à 15%. Comment communiquez-vous cette crise ?',o:['Vous tenir à côté et miauler à pleins poumons jusqu\'à ce qu\'un humain arrive','Vous asseoir silencieusement près de la gamelle, fixant l\'âme de l\'humain jusqu\'à ce qu\'il se sente coupable','Aller vers l\'humain, toucher doucement sa jambe et le guider vers la gamelle','Peu importe, vous n\'avez pas faim de toute façon. Si l\'humain vous nourrit, tant mieux']},
      {e:'🚪',t:'La porte d\'entrée est laissée grande ouverte par accident. Votre prochaine action ?',o:['Sortir hardiment pour explorer le couloir et rencontrer les voisins','Battre en retraite instantanément sous le canapé — le monde extérieur est plein d\'aspirateurs imprévisibles','Vous asseoir à la porte, fixant l\'ouverture d\'un air méfiant — qui ose entrer ?','Passer la tête, renifler, puis sortir explorer rapidement et revenir tout aussi vite']},
      {e:'🧹',t:'L\'humain sort l\'aspirateur. Votre réaction ?',o:['Vous cacher sous le lit jusqu\'à ce que ce monstre bruyant disparaisse — cela peut prendre des heures','La curiosité l\'emporte sur la peur — observer cet objet à distance sécuritaire','L\'ignorer complètement et continuer à dormir. C\'est quoi un aspirateur ?','Siffler sur l\'aspirateur pour tenter de l\'intimider et le faire reculer']},
      {e:'⏰',t:'Il est 3h du matin. Quel est votre niveau d\'énergie ?',o:['LES ZOOMIES !!! Sprint complet, sauter sur les meubles, renverser les verres d\'eau — ÇA C\'EST LA VIE !','Blotti contre un humain bien chaud, ronronnant doucement','Se réveiller, s\'étirer, vérifier la gamelle dans la cuisine (puis retourner dormir)','Ouvrir un œil pour voir ce qui se passe, décider que c\'est trop bruyant, continuer à dormir']},
      {e:'📦',t:'L\'humain ramène un nouveau carton à la maison. Que faites-vous ?',o:['Revendiquer le carton en 0,5 seconde et siffler sur toute créature qui tente de s\'approcher','Observer d\'abord — est-ce sûr ? Est-ce que ça sent un autre chat ? Attendre un jour avant d\'entrer','Sauter immédiatement dedans, rester coincé, et regarder l\'humain avec des yeux innocents','Ennuyeux. Ce carton n\'est pas aussi bien que l\'ancien. Totalement indifférent']},
      {e:'👥',t:'Un inconnu vient à la maison. Votre première réaction ?',o:['Courir immédiatement vers lui et le saluer avec des miaulements sonores, exigeant des caresses','Disparaître. Je sortirai quand je me sentirai en sécurité — cela peut prendre des heures ou des jours','Observer depuis derrière les meubles, évaluer le niveau de menace de cette personne','Continuer ce que vous faites, mais garder un œil sur lui']},
      {e:'💻',t:'L\'humain travaille sur son ordinateur portable. Vous décidez de…',o:['Vous asseoir sur le clavier. Votre derrière est plus important que son travail','Vous asseoir sur ses genoux et ronronner, ronronner, ronronner','Observer depuis une chaise voisine, lui jetant parfois le regard « prends une pause »','L\'ignorer complètement — trouver un coin ensoleillé et faire la sieste']},
      {e:'🐟',t:'Quelle phrase décrit le mieux votre routine quotidienne ?',o:['Je fais la même chose exactement à la même heure chaque jour — la routine est mon deuxième prénom','Je n\'ai absolument aucune routine — l\'humain ne peut jamais deviner ce que je vais faire','J\'ai une routine mais je change parfois de plan selon mon humeur','C\'est quoi une routine ? Je ne suis que l\'appel de mon cœur']},
      {e:'🪶',t:'On vous donne une canne à plumes. Que se passe-t-il ensuite ?',o:['Salto arrière ! Bond ! Morsure ! C\'est la chasse ! C\'est la vie !','Donner un petit coup de patte, puis s\'en aller — trop enfantin','Fixer silencieusement, calculer l\'angle d\'attaque optimal, puis frapper avec précision','Faire semblant de ne pas être intéressé, mais toucher discrètement quand l\'humain ne regarde pas']},
      {e:'🏠',t:'Votre relation avec votre humain est…',o:['Je suis le patron, ils sont mes serviteurs. Notre relation est saine (pour eux)','Nous sommes des âmes sœurs — j\'ai besoin d\'eux, ils ont besoin de moi','Nous sommes colocataires. Je leur permets occasionnellement de me caresser après contrôle de sécurité','Humain ? C\'est quoi un humain ? Je ne connais que la créature bipède qui me donne à manger']}
    ]
  },

    typeInfo:{LCQAK:{name:'El Atleta de Elite',breed:'Bengala',desc:'Atletico, silencioso, rutinario. Escala paredes sin hacer ruido. Ejecuta movimientos dificiles con precision de cirujano.'},LCQGK:{name:'La Dulzura Picante',breed:'Calico',desc:'Lleno de amor pero con un temperamento ardiente. Una bomba de tiempo en una vida rutinaria. Te lame y luego te muerde, sin aviso.'},LCVAK:{name:'El Espectaculo',breed:'Siames',desc:'Extrovertido, ruidoso, hiperactivo. Da el mismo espectaculo a la misma hora cada dia. No soporta ser ignorado.'},LCVGK:{name:'El Velcro Dramatico',breed:'Naranja Atigrado',desc:'Obsesionado con la comida, pegajoso, rutinario. Se pega como pegamento naranja. El sonido de una lata lo hace saltar del sueno mas profundo.'},LCVAW:{name:'La Gran Diva',breed:'Maine Coon',desc:'Enorme, esponjoso, impredecible. Melena de leon y presencia real, pero sigue a su humano como un perrito. Hoy mimos, manana dramas.'},LMQAK:{name:'El Noble Dorado',breed:'Golden Shaded',desc:'Elegante, noble, rutinario. Duerme la siesta en el mismo rayo de sol cada dia, su pelaje dorado brillando.'},LMQGK:{name:'El Alma Gemela Peluda',breed:'Ragdoll',desc:'Dulce, pacifico, rutinario. Exige mimos a la misma hora cada dia. Se derrite completamente de amor cuando lo cargan.'},LMQAW:{name:'El Vagabundo Plateado',breed:'American Shorthair',desc:'Tranquilo por fuera, impredecible por dentro. Holgazanea todo el dia, luego tira tu vaso a las 3 AM con los ojos mas inocentes.'},LMVAK:{name:'El Companero Parlanchin',breed:'Li Hua',desc:'Listo, hablador, rutinario. La leyenda de las calles chinas. Celebra reuniones diarias en el mismo sitio para cotillear sobre todo.'},LMVGK:{name:'El Confidente Real',breed:'Buho Nival',desc:'Silencioso, sabio, rutinario. Aparece sin hacer ruido como un buho a la misma hora, trayendo una presencia calmante.'},LMVGW:{name:'La Trampa de Terciopelo',breed:'Scottish Fold',desc:'Usa su ternura para manipularte, luego te castiga por usar tenedor en vez de cuchara. Cambios de humor instantaneos.'},SCQAK:{name:'El Cazador Silencioso',breed:'Bosque de Noruega',desc:'Majestuoso, independiente, rutinario. Patrulla el jardin a la misma hora, el guardian silencioso de la naturaleza.'},SCQGK:{name:'El Bromista Fantasma',breed:'Blanco Heterocromo',desc:'Misterioso, travieso, rutinario. Ojos bicolores brillan, las bromas empiezan a las 4 en punto. Tira una lampara y desaparece.'},SCQAW:{name:'El Solitario Salvaje',breed:'Puma',desc:'Independiente, poderoso, impredecible. Cruza la naturaleza como un puma, silencioso, sin dejar rastro.'},SCVAK:{name:'El Indomable',breed:'Savannah',desc:'Independiente, dominante, rutinario. Patrulla su territorio a la misma hora, estableciendo las reglas. El mundo entero es su jungla.'},SCVGK:{name:'La Leyenda Callejera',breed:'Panda Rojo',desc:'Astuto, callejero, rutinario. Revisa su territorio a la misma hora con una mezcla de curiosidad y calculo.'},SCVAW:{name:'El Relampago de la Sabana',breed:'Serval',desc:'Alto, agil, se mueve como el viento. Las piernas mas largas de todos los felinos. Acrobacias de caza hoy, emboscada manana.'},SMQAK:{name:'El Filosofo Tranquilo',breed:'British Shorthair',desc:'Relajado, independiente, rutinario. Medita en el mismo sitio cada dia, la encarnacion del manten la calma y sigue.'},SMQGK:{name:'El Rey del Sofa',breed:'Persa',desc:'La cumbre de la relajacion. Cambia de postura para dormir a la misma hora. Odia el cambio, ama las almohadas mullidas.'},SMQAW:{name:'El Ermitano de las Cumbres',breed:'Leopardo de las Nieves',desc:'Sereno, distante, aparece solo cuando quiere. El felino mas esquivo del mundo.'},SMQGW:{name:'El Dragon Durmiente',breed:'Panda Gigante',desc:'Casero, silencioso, a veces explosivo. Cada tres semanas, sprint a las 3 AM y vuelta a dormir como si nada.'},SMVAK:{name:'El Artista Excentrico',breed:'Gato Vaca',desc:'En esmoquin, causa el caos mas creativo. Performances artisticas diarias, tira vasos, crea de noche.'},SMVGK:{name:'La Sombra Elegante',breed:'Gato Negro',desc:'Misterioso, privado, rutinario. Aparece y desaparece como una sombra. Suaves trinos reservados para una sola persona.'},SMVAW:{name:'El Fantasma Orejinegro',breed:'Caracal',desc:'Independiente, sensible, imposible de rastrear. Esos penachos negros son antenas, siempre escuchando, siempre listo para desaparecer.'}},

      {e:'🛋️',t:'Tu humano se sienta en el sofá. ¿Qué haces?',o:['Saltar inmediatamente sobre su pecho, ronronear fuerte y bloquear la pantalla','Observarlo desde el otro lado de la habitación — disfrutar de su compañía a una distancia respetuosa','Caminar hacia él y sentarte a sus pies — ni muy cerca ni muy lejos','Ignorarlo por completo, seguir durmiendo, pero mover la punta de la cola para mostrar que lo notaste']},
      {e:'🐭',t:'Un ratón de juguete rueda por el suelo. ¿Tu reacción?',o:['¡Dar una voltereta, derrapar en la alfombra y hacerlo pedazos!','Verlo pasar, parpadear lentamente y volver a la siesta','Acechar silenciosamente, agacharte y abalanzarte sin hacer ruido — modo caza activado','Fingir que no lo viste, pero tus orejas giran y tu cola empieza a moverse']},

      {e:'🚪',t:'La puerta principal se deja abierta por accidente. ¿Tu siguiente movimiento?',o:['Salir audazmente a explorar el pasillo y conocer a los vecinos','Retirarte instantáneamente debajo del sofá — el mundo exterior está lleno de aspiradoras impredecibles','Sentarte en la puerta, mirando la abertura con sospecha — ¿quién se atreve a entrar?','Asomar la cabeza, olfatear, luego salir rápido a explorar y volver igual de rápido']},
      {e:'🧹',t:'El humano saca la aspiradora. ¿Tu reacción?',o:['Esconderte debajo de la cama hasta que este monstruo ruidoso desaparezca — puede llevar horas','La curiosidad vence al miedo — observar este objeto desde una distancia segura','Ignorarlo por completo y seguir durmiendo. ¿Qué es una aspiradora?','Bufar a la aspiradora, intentando intimidarla para que se retire']},
      {e:'⏰',t:'Son las 3 de la mañana. ¿Cuál es tu nivel de energía?',o:['¡¡¡ZOOMIES!!! ¡Sprint total, saltar sobre los muebles, tirar vasos de agua — ESTO ES VIVIR!','Acurrucado junto a un humano calentito, ronroneando suavemente','Despertar, estirarte, revisar el plato de comida en la cocina (y luego volver a dormir)','Abrir un ojo para ver qué pasa, decidir que hay demasiado ruido, seguir durmiendo']},
      {e:'📦',t:'El humano trae una caja de cartón nueva a casa. ¿Qué haces?',o:['Reclamar la caja en 0,5 segundos y bufar a cualquier criatura que intente acercarse','Observar primero — ¿es segura? ¿Huele a otro gato? Esperar un día antes de entrar','Saltar inmediatamente dentro, quedarte atascado y mirar al humano con ojos inocentes','Aburrido. Esta caja no es tan buena como la anterior. Totalmente indiferente']},
      {e:'👥',t:'Un desconocido llega a casa. ¿Tu primera reacción?',o:['Correr inmediatamente hacia él y saludarlo con maullidos fuertes, exigiendo caricias','Desaparecer. Saldré cuando me sienta seguro — pueden ser horas o días','Observar desde detrás de los muebles, evaluar el nivel de amenaza de esta persona','Continuar con lo que estabas haciendo, pero mantener un ojo puesto en él']},
      {e:'💻',t:'El humano está trabajando en su portátil. Decides…',o:['Sentarte en el teclado. Tu trasero es más importante que su trabajo','Sentarte en su regazo y ronronear, ronronear, ronronear','Observar desde una silla cercana, lanzándole de vez en cuando la mirada de «tómate un descanso»','Ignorarlo por completo — encontrar un lugar soleado y echarte una siesta']},
      {e:'🐟',t:'¿Qué frase describe mejor tu rutina diaria?',o:['Hago lo mismo exactamente a la misma hora cada día — la rutina es mi segundo nombre','No tengo absolutamente ninguna rutina — el humano nunca puede adivinar qué haré después','Tengo una rutina pero a veces cambio de planes según mi estado de ánimo','¿Qué es una rutina? Solo sigo el llamado de mi corazón']},

    typeInfo:{LCQAK:{name:'少年的拼勁',breed:'孟加拉豹貓',desc:'運動型、沉默嘅規律控。無聲無息咁爬牆，精準到好似手術刀咁完成高難度動作。生活節奏比鬧鐘仲準時。'},LCQGK:{name:'辣椒甜心',breed:'三色貓',desc:'愛心爆棚但脾氣火爆。規律生活中嘅計時炸彈。對最愛嘅人溫柔到暈，轉頭因為俾人摸咗個肚就咬返你，冇仇報。'},LCVAK:{name:'知我咩料啦',breed:'暹羅貓',desc:'外向、嘈嘈閉、極度規律。每日同一時間同一地點表演同一套好戲。絕對唔可以俾人無視，一定要做全場最搶眼嗰個。'},LCVGK:{name:'鬼馬黐身膏藥',breed:'橘貓',desc:'為食到癲、黐人到爆。好似橙色萬能膠咁黐住主人，成個世界得返食物同愛。一聽到開罐聲即刻由沉睡中彈起身，快過閃電。'},LCVAW:{name:'好犀利',breed:'緬因貓',desc:'巨型、蓬鬆、完全冇規律可言。獅子咁嘅鬃毛加帝王氣場，但係黐主人黐到成隻狗咁。今日攬攬聽日投訴後日跳上飯檯，日日新鮮。'},LMQAK:{name:'太陽後裔',breed:'金漸層',desc:'優雅、貴氣、超有規律。每日同一時間喺陽光下優雅小睡，金色被毛閃閃發光。貴族氣質爆燈，瞓覺都要揀最靚嗰個位。'},LMQGK:{name:'糯米糍',breed:'布偶貓',desc:'甜到漏、和平主義者、好有規律。每日準時要求抱抱，抱住嗰陣會因為太愛你而完全攤軟，成pat嘢咁。'},LMQAW:{name:'Hea霸',breed:'美國短毛貓',desc:'睇落好淡定內心完全放飛。今日攤喺梳化成日，聽日凌晨三點爬上書架打翻你隻杯，再用最無辜嘅眼神望住你。永遠都係佢玩晒。'},LMVAK:{name:'吹水講真',breed:'狸花貓',desc:'聰明、口水多過茶、超有規律。每日同一位置開會，討論今日食咩、天氣點樣、隔籬貓嘅八卦，總之冇嘢唔講得一餐。'},LMVGK:{name:'御喵展護衛',breed:'雪鴞',desc:'安靜、睿智、有規律。雪鴞咁沉默咁準時出現，帶嚟平靜嘅氣場。鍾意深夜嘅沉思，唔出聲但係乜都睇穿晒。'},LMVGW:{name:'扮豬食老虎',breed:'蘇格蘭摺耳貓',desc:'用可愛呃你開罐頭，然後因為你用叉而唔係用匙羹就將個罐頭抌落地。情緒話變就變，完全估佢唔到。天使面孔魔鬼心腸。'},SCQAK:{name:'寡言刺客',breed:'挪威森林貓',desc:'威嚴、獨立、極有規律。每日準時巡視花園，係大自然嘅沉默守護者。爬樹高手但從不炫耀，低調到冇人發覺佢嘅存在。'},SCQGK:{name:'諗下先',breed:'鴛鴦眼白貓',desc:'神秘、百厭、超有規律。鴛鴦眼一閃，凌晨四點準時開工整蠱人。打翻枱燈之後好似鬼魂咁消失，留低一個爛攤子俾你執。'},SCQAW:{name:'齋啡',breed:'美洲獅',desc:'獨立、霸氣、隨心所欲。美洲獅咁無聲穿越山林，冇邊界可以框住佢。出現嗰陣令人震懾，消失嗰陣連腳印都唔留。'},SCVAK:{name:'想去邊就去邊',breed:'薩凡納貓',desc:'獨立、霸道、超有規律。每日同一時間巡視地盤，制定呢間屋嘅規矩。成個世界都係佢嘅狩獵叢林，邊個敢話佢？'},SCVGK:{name:'浩南山雞',breed:'小熊貓',desc:'敏銳、街頭智慧、超有規律。每日固定時間檢查地盤，用好奇怪同計算嘅混合眼光看待一切。生存力爆燈，咩環境都搞得掂。'},SCVAW:{name:'去到幾盡',breed:'藪貓',desc:'高挑、靈動、嚟去如風。有貓科中最修長嘅四肢同超大耳仔。今日窗台表演獵雀雜技，聽日梳化後面一跳兩米高，冇嘢捉得住佢。'},SMQAK:{name:'見步行步',breed:'英國短毛貓',desc:'淡定、獨立、超有規律。每日同一地點準時放空，係終極「保持冷靜繼續前行」嘅貓。低維護、唔煩人，完美室友。'},SMQGK:{name:'閉家鎖',breed:'波斯貓',desc:'放鬆、宅、超有規律。每日同一時間換一個睡姿，放鬆嘅絕對巔峰。最憎變化，除咗毛絨枕頭同安靜嘅環境之外乜都唔要。'},SMQAW:{name:'你睇我唔到',breed:'雪豹',desc:'沉靜、高冷、嚟去隨心。最難被見到嘅存在。唔會解釋自己嘅行蹤，只會喺覺得值得嘅時候先出現。唔出聲但氣場冇得輸。'},SMQGW:{name:'瞓醒发威',breed:'大熊貓',desc:'宅、安靜、間中爆發。每三個禮拜凌晨三點突然全速衝刺然後倒頭繼續瞓，好似乜都冇發生過。完全冇得估，隨時爆俾你睇。'},SMVAK:{name:'搞搞震專家',breed:'奶牛貓',desc:'俏皮、獨立、超有規律。著住黑白禮服做最曳嘅嘢。每日同一時間進行「藝術行為」，用爪拍翻水杯、半夜搞創作，完全唔理世人目光。'},SMVGK:{name:'暗黑貴公子',breed:'黑貓',desc:'神秘、私密、超有規律。黑影咁準時出現又消失，只為一個特定嘅人展現輕柔顫音。對陌生人同噪音零容忍，高貴到冇朋友。'},SMVAW:{name:'唔该行開啦',breed:'獰貓',desc:'獨立、敏感、行蹤完全冇得捉。黑色耳簇好似兩條天線，隨時接收緊訊號，隨時準備消失。情緒到了就會盡情表達，情緒過咗就當冇事發生。唔使解釋，唔使理解，總之俾啲空間佢就啱㗎喇。'}},

function refreshI18n(){
  const d=I18N[LANG];
  document.getElementById('loadingText').textContent=d.loading;
  document.getElementById('introTitle').innerHTML=d.introTitle;
  document.getElementById('introDesc').innerHTML=d.introDesc;
  document.getElementById('btnStart').textContent=d.btnStart;
  document.getElementById('btnOverview').textContent=d.btnOverview;
  document.getElementById('introMeta').innerHTML=d.introMeta;
  initPageViews();
  document.getElementById('btnRetake').textContent=d.btnRetake;
  document.getElementById('btnShare').textContent=d.btnShare;
  // Re-render quiz if active
  if(document.getElementById('quiz').classList.contains('active')) rq();
  // Re-render overview if currently on overview screen
  if(document.getElementById('overview').classList.contains('active')) showOverview();
  // Re-render result screen if active
  if(document.getElementById('result').classList.contains('active') && window._lastTop3){
    showResult(window._lastTop3[0], window._lastTop3, window._lastUD);
  }
  // Update dim popup if open
  if(document.getElementById('dimPopup').classList.contains('active')){
    document.getElementById('dimPopupTitle').textContent=d.dimPopupTitle;
    document.getElementById('dimPopupSub').textContent=d.dimPopupSub;
    renderDimCards();
  }
}

function updateResultText(){
  const d=I18N[LANG];
  const dimLabel=document.getElementById('dimLabel');
  const foLabel=document.getElementById('foLabel');
  if(dimLabel)dimLabel.textContent=d.dimLabel;
  if(foLabel)foLabel.textContent=d.foLabel;
  const fls=document.querySelectorAll('.friend-label');
  const ols=document.querySelectorAll('.opponent-label');
  fls.forEach(x=>x.textContent=d.friends);
  ols.forEach(x=>x.textContent=d.opponents);
}

// ===== DIMENSIONS POPUP =====
function showDimPopup(){
  const d=I18N[LANG];
  document.getElementById('dimPopupTitle').textContent=d.dimPopupTitle;
  document.getElementById('dimPopupSub').textContent=d.dimPopupSub;
  renderDimCards();
  document.getElementById('dimPopup').classList.add('active');
}
function closeDimPopup(){
  document.getElementById('dimPopup').classList.remove('active');
}
function renderDimCards(){
  const d=I18N[LANG];
  const colors=['#B8860B','#C4734F','#5B8C5A','#6B5E4A','#B8860B'];
  document.getElementById('dimPopupBody').innerHTML=d.dimCards.map((c,i)=>`
    <div class="dim-card">
      <div class="dim-card-head">
        <span class="dim-card-icon">${c.icon}</span>
        <span class="dim-card-title">${c.title}</span>
        <span class="dim-card-sub">${c.sub}</span>
      </div>
      <div class="dim-card-desc">${c.desc}</div>
      <div class="dim-card-tags">${c.tags.map(t=>`<span class="dim-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}

// ===== TYPE DATA =====
function getGroup(code){
  const d=code[0]+code[1];
  if(d==='LC')return 0; if(d==='LM')return 1;
  if(d==='SC')return 2; return 3;
}
function getBreed(code){
  if(!code)return'';
  const d=I18N[LANG];
  const ti=(d.typeInfo&&d.typeInfo[code])||{};
  if(ti.breed)return ti.breed;
  const t=TYPES.find(x=>x.code===code);

}

  {code:"SCVAW",name:"草原闪电",en:"The Savanna Striker",breed:"薮猫",breedEn:"Serval",color:"#C4943C",desc:"高挑、灵动、来去如风。薮猫拥有猫科中最修长的四肢和超大的耳朵——像永远在接收来自草原的秘信。今天在窗台上演猎鸟杂技，明天偷偷埋伏在沙发背后，一蹦两米高。对一切都充满好奇，但下一秒兴趣就换成另一片叶子。",descEn:"Tall, agile, moves like the wind. The Serval has the longest legs-to-body ratio of any cat — always tuned to whispers from the savanna. Performs acrobatic bird hunts on the windowsill today, ambushes from behind the couch tomorrow, leaping two meters high. Curious about everything, then forgets it for the next leaf blowing by.",mbti:"ENTP",mbtiName:"草原即兴者",mbtiNameEn:"The Savanna Improviser",traits:["高挑","灵动","好奇","不可预测"],traitsEn:["Tall","Agile","Curious","Unpredictable"],f:["SCVAK","LCVAW","SMVAK"],o:["SMQGK","LMQGK","LMVGK"],d:{S:"S",E:"C",V:"V",A:"A",C:"W"}},

  {code:"SMQGW",name:"蛰伏潜龙",en:"The Sleeping Dragon",breed:"大熊猫",breedEn:"Giant Panda",color:"#4A4A4A",desc:"宅、安静、偶尔爆发。每三周凌晨 3 点突然全速冲刺然后倒头继续睡，仿佛什么都没发生。完全不可预测。",descEn:"Homebody, quiet, occasionally explosive. Every three weeks, full sprint at 3 AM then back to sleep like nothing happened. Utterly unpredictable.",mbti:"ISFP",mbtiName:"间歇性火山",mbtiNameEn:"The Intermittent Volcano",traits:["宅","安静","间歇性爆发","不可预测"],traitsEn:["Homebody","Quiet","Explosive","Unpredictable"],f:["SMQGK","SCQGK","SMQAK"],o:["LCVAK","LCQAK","LMVAK"],d:{S:"S",E:"M",V:"Q",A:"G",C:"W"}},
  {code:"SMVAK",name:"抽象圣体",en:"The Eccentric Artist",breed:"奶牛猫",breedEn:"Cow Cat",color:"#2A2A2A",desc:"俏皮、独立、规律。身着黑白礼服，却干着最淘气的事。每天同一时间进行「艺术行为」——用爪子拍翻水杯、在夜间创作。完全不受社会规则约束。",descEn:"Playful, independent, routine-driven. Wearing a tuxedo suit, causing the naughtiest mayhem. Performs 'artistic behaviors' daily — paw-swipes water glasses, nocturnal creativity. Ignoring social norms.",mbti:"ISFP",mbtiName:"古怪创意者",mbtiNameEn:"The Quirky Creative",traits:["俏皮","创意","独立","规律"],traitsEn:["Playful","Creative","Independent","Routine"],f:["LMVAK","SCVAW","SCVAK"],o:["LMQGK","SMQGK","LCQGK"],d:{S:"S",E:"M",V:"V",A:"A",C:"K"}},
  {code:"SMVGK",name:"优雅暗影",en:"The Elegant Shadow",breed:"黑猫",breedEn:"Black Cat",color:"#1A1A2E",desc:"神秘、私密、规律。黑影般准时出现又消失，只为一个特定的人类展现轻柔的颤音。对陌生人和噪音零容忍。",descEn:"Mysterious, private, routine-driven. Appears and vanishes like a shadow on schedule. Soft trills reserved for one specific human. Zero tolerance for strangers.",mbti:"INFJ",mbtiName:"私密神秘主义者",mbtiNameEn:"The Private Mystic",traits:["神秘","私密","敏锐","规律"],traitsEn:["Mysterious","Private","Sharp","Routine"],f:["LMVGK","SCVGK","SMQGK"],o:["LCVAK","SCVAK","LMVAK"],d:{S:"S",E:"M",V:"V",A:"G",C:"K"}},

  [{S:'L',V:'V',E:'C'},{S:'L',V:'V',E:'M'},{S:'L',V:'Q',E:'M'},{S:'S',V:'Q',E:'M'}],
  [{C:'K',E:'M'},{C:'W',E:'C'},{C:'K',E:'C'},{C:'W',E:'M'}],

// ===== INIT =====
(function(){
  const VP = ['zh','en','hk','ko','ja','fr','es','ru','ar'];
  // Priority: URL param > localStorage > IP detection > default 'en'
  var urlLang = new URLSearchParams(window.location.search).get('lang');
  if(urlLang && VP.includes(urlLang)){
    LANG = urlLang;
    setLang(LANG);
    initPageViews();
    setTimeout(function(){s('intro');},600);
  }else{
    var saved = localStorage.getItem('cati_lang');
    if(saved && VP.includes(saved)){
      LANG = saved;
      setLang(LANG);
      initPageViews();
      setTimeout(function(){s('intro');},600);
    }else{
      // IP detection with 2s timeout
      var done = false;
      var timer = setTimeout(function(){
        if(!done){done=true;setLang(LANG);initPageViews();setTimeout(function(){s('intro');},600);}
      },2000);
      // Try ipapi.co
      fetch('https://ipapi.co/json/',{cache:'no-store'})
        .then(function(r){return r.ok?r.json():Promise.reject();})
        .then(function(d){
          if(!done && d&&d.country_code){
            done = true;
            clearTimeout(timer);
            LANG = detectLangFromCountry(d.country_code);
            setLang(LANG);
            initPageViews();
            setTimeout(function(){s('intro');},600);
          }
        })
        .catch(function(){
          // Fallback: try ip-api.com
          return fetch('https://ip-api.com/json/?fields=countryCode',{cache:'no-store'})
            .then(function(r){return r.ok?r.json():Promise.reject();})
            .then(function(d){
              if(!done && d&&d.countryCode){
                done = true;
                clearTimeout(timer);
                LANG = detectLangFromCountry(d.countryCode);
                setLang(LANG);
                initPageViews();
                setTimeout(function(){s('intro');},600);
              }
            })
            .catch(function(){
              if(!done){done=true;clearTimeout(timer);setLang(LANG);initPageViews();setTimeout(function(){s('intro');},600);}
            });
        });
    }
  }
})();

// Localized breed/cati name pools per language
function getBreedPool(){
  var lang=LANG;
  if(lang==='zh'||lang==='hk')return [...new Set(TYPES.map(function(t){return t.breed}))];
  var d=I18N[lang];
  if(d&&d.typeInfo){
    var breeds=Object.values(d.typeInfo).map(function(ti){return ti.breed}).filter(Boolean);
    if(breeds.length>=4)return [...new Set(breeds)];
  }
  return [...new Set(TYPES.map(function(t){return t.breedEn}))];
}
function getCATIPool(){
  var lang=LANG;
  if(lang==='zh'||lang==='hk')return TYPES.map(function(t){return t.name});
  var d=I18N[lang];
  if(d&&d.typeInfo){
    var names=Object.values(d.typeInfo).map(function(ti){return ti.name}).filter(Boolean);
    if(names.length>=4)return [...new Set(names)];
  }
  return TYPES.map(function(t){return t.en});
}
function pickRandom(arr,n){
  var pool=arr.slice();
  var result=[];
  for(var i=0;i<n;i++){
    if(pool.length===0)break;
    var idx=Math.floor(Math.random()*pool.length);
    result.push(pool.splice(idx,1)[0]);
  }
  return result;
}
var _descInterval=null;
function rotateIntroDesc(){
  var d=I18N[LANG];
  var template=d.introDesc;
  if(template.indexOf('{breed1}')===-1)return;
  var breedPool=getBreedPool();
  var catiPool=getCATIPool();
  if(breedPool.length<2||catiPool.length<2)return;
  var breeds=pickRandom(breedPool,2);
  var catis=pickRandom(catiPool,2);
  var desc=template.replace('{breed1}',breeds[0]).replace('{breed2}',breeds[1]).replace('{cati1}',catis[0]).replace('{cati2}',catis[1]);
  var el=document.getElementById('introDesc');
  if(el)el.innerHTML=desc;
}
function startDescRotation(){
  if(_descInterval)clearInterval(_descInterval);
  rotateIntroDesc();
  _descInterval=setInterval(rotateIntroDesc,5000);
}
function stopDescRotation(){
  if(_descInterval){clearInterval(_descInterval);_descInterval=null;}
}

// ===== SCORING =====
function calc(){
  const dims={L:0,S:0,C:0,M:0,V:0,Q:0,A:0,G:0,K:0,W:0};
  const w={L:1.5,S:1.5,C:1.2,M:1.2,V:1.3,Q:1.3,A:1.4,G:1.4,K:1,W:1};
  answers.forEach(a=>{
    const m=Q_MAP[a.q][a.o];
    Object.entries(m).forEach(([d,v])=>{if(dims[v]!==undefined)dims[v]+=w[v]||1})
  });
  const uD={S:dims.L>=dims.S?'L':'S',E:dims.C>=dims.M?'C':'M',V:dims.V>=dims.Q?'V':'Q',A:dims.A>=dims.G?'A':'G',C:dims.K>=dims.W?'K':'W'};
  // Continuous scoring — match strength based on dimension ratio, not just binary
  const rw={S:2,E:2,V:2,A:2,C:1.5};
  const mx=9.5;
  const opposites={'L':'S','S':'L','C':'M','M':'C','V':'Q','Q':'V','A':'G','G':'A','K':'W','W':'K'};
  const results=TYPES.map(t=>{
    let sc=0;
    Object.keys(rw).forEach(group=>{
      const td=t.d[group];
      const od=opposites[td];
      const total=(dims[td]||0)+(dims[od]||0);
      const strength=total>0?dims[td]/total:0.5;
      sc+=strength*rw[group];
    });
    return{type:t,pct:Math.round(sc/mx*100)};
  });
  results.sort((a,b)=>b.pct-a.pct);
  const top3=results.slice(0,3);
  s('result');
  window._lastTop3=top3;window._lastUD=uD;
  showResult(top3[0],top3,uD);
}

// ===== TOP3 CAROUSEL =====
let _carouselIndex=0;
let _ovActiveFilter=-1; // preserve filter state across language switches
let _carouselTop3=[];
let _touchStartX=0;
let _touchEndX=0;

function renderTop3Carousel(top3){
  _carouselTop3=top3;
  _carouselIndex=0;
  const d=I18N[LANG];
  const track=document.getElementById('top3Track');
  const paws=document.getElementById('top3Paws');
  track.innerHTML=top3.map((r,i)=>{
    const src=getImage(r.type.code);
    const breed=getBreed(r.type.code);
    return `<div class=top3-slide${i===0?' active-slide':''}>
      <div class=top3-avatar-wrap onclick="showModal('${r.type.code}')">
        ${src?`<img class=top3-avatar src="${src}" alt="${breed}" loading=lazy>`:`<div class=top3-avatar-fallback>🐾</div>`}
        <span class=top3-pct-badge>${r.pct}%</span>
      </div>
      <div class=top3-slide-info>
        <div class=top3-slide-code style=color:${r.type.color}>${r.type.code}</div>
        <div class=top3-slide-name>${r.type.name} · ${r.type.en}</div>
        <div class=top3-slide-breed>${breed}</div>
        <span class=top3-slide-link onclick="showModal('${r.type.code}')">${d.modalDetail}</span>
      </div>
    </div>`;
  }).join('');
  paws.innerHTML=top3.map((_,i)=>`<span class=paw-step${i===0?' paw-active':''} onclick="goToSlide(${i})">${i===0?'🐈‍⬛':'🐾'}</span>`).join('');
  updateCarouselPosition();

  // Touch events
  track.ontouchstart=function(e){_touchStartX=e.changedTouches[0].screenX};
  track.ontouchend=function(e){_touchEndX=e.changedTouches[0].screenX;handleSwipe()};
  // Mouse drag
  let mouseDown=false, mouseStartX=0;
  track.onmousedown=function(e){mouseDown=true;mouseStartX=e.clientX;track.style.transition='none'};
  track.onmousemove=function(e){if(!mouseDown)return;e.preventDefault();const diff=e.clientX-mouseStartX;track.style.transform=`translateX(calc(${-_carouselIndex*80}%-${diff}px))`};
  track.onmouseup=function(e){if(!mouseDown)return;mouseDown=false;track.style.transition='transform 0.45s cubic-bezier(.4,0,.2,1)';const diff=e.clientX-mouseStartX;if(Math.abs(diff)>50){if(diff>0&&_carouselIndex>0)goToSlide(_carouselIndex-1);else if(diff<0&&_carouselIndex<_carouselTop3.length-1)goToSlide(_carouselIndex+1);else updateCarouselPosition()}else updateCarouselPosition()};
  track.onmouseleave=function(){if(mouseDown){mouseDown=false;track.style.transition='transform 0.45s cubic-bezier(.4,0,.2,1)';updateCarouselPosition()}};
}

function handleSwipe(){
  const diff=_touchStartX-_touchEndX;
  if(Math.abs(diff)>50){
    if(diff>0&&_carouselIndex<_carouselTop3.length-1)goToSlide(_carouselIndex+1);
    else if(diff<0&&_carouselIndex>0)goToSlide(_carouselIndex-1);
    else updateCarouselPosition();
  }else updateCarouselPosition();
}

function goToSlide(i){
  _carouselIndex=Math.max(0,Math.min(i,_carouselTop3.length-1));
  updateCarouselPosition();
  // Update paw trail
  document.querySelectorAll('.paw-step').forEach(function(d,idx){
    d.classList.toggle('paw-active',idx===_carouselIndex);
    d.textContent=idx===_carouselIndex?'🐈‍⬛':'🐾';
  });
  // Update active slide
  document.querySelectorAll('.top3-slide').forEach(function(s,idx){
    s.classList.toggle('active-slide',idx===_carouselIndex);
  });
}

function updateCarouselPosition(){
  const track=document.getElementById('top3Track');
  if(track)track.style.transform=`translateX(-${_carouselIndex*80}%)`;
}

  const mbtiName=LANG==='zh'?t.mbtiName:(ti.mbtiName||t.mbtiNameEn||t.mbtiName);
  const traits=LANG==='zh'?t.traits:(ti.traits||t.traitsEn||t.traits);
  const gi=getGroup(t.code);const groupMap=[d.ovGroup1||'Chaos Creators',d.ovGroup2||'The Monarchs',d.ovGroup3||'Shadow Stalkers',d.ovGroup4||'Zen Masters'];const groupName=groupMap[gi];
  document.getElementById('modalBox').innerHTML=`
    <button class=modal-close onclick="document.getElementById('modal').classList.remove('active')">×</button>
    ${src?`<img class=modal-img src="${src}" alt="${breed}" onerror="this.style.display='none';document.getElementById('mfallback').style.display='flex'"><div id=mfallback class=cat-fallback style=display:none;aspect-ratio:16/9;font-size:4rem>🐾</div>`:`<div class=cat-fallback style=aspect-ratio:16/9;font-size:4rem>🐾</div>`}
    <div class=modal-body>
      <div class=modal-code style=color:${t.color}>${t.code}</div>
      <div class=modal-name>${LANG==='zh'?typeName+'「'+t.en+'」':t.en+'『'+typeName+'』'}</div>
      <div class=modal-breed>${breed} / ${breedEn}</div>
      <div class=modal-group style=color:${t.color}>${groupName}</div>
      <div class=modal-desc>${desc}</div>
      <div class=modal-mbti>${t.mbti} — ${mbtiName}</div>
      <div class=modal-traits>${traits.map(x=>`<span class=trait-pill>${x}</span>`).join('')}</div>
      <div class=modal-fo>
        <h4>${d.modalFriends}${LANG==='zh'||LANG==='hk'||LANG==='ko'||LANG==='ja'?'：':LANG==='ar'?' :':':'}${t.f.map(c=>{const x=TYPES.find(tt=>tt.code===c);if(!x)return c;const xi=(d.typeInfo&&d.typeInfo[c])||{};return x.code+' '+(xi.name||x.name)}).join(' · ')}</h4>
        <h4 style=margin-top:6px>${d.modalOpponents}${LANG==='zh'||LANG==='hk'||LANG==='ko'||LANG==='ja'?'：':LANG==='ar'?' :':':'}${t.o.map(c=>{const x=TYPES.find(tt=>tt.code===c);if(!x)return c;const xi=(d.typeInfo&&d.typeInfo[c])||{};return x.code+' '+(xi.name||x.name)}).join(' · ')}</h4>
      </div>
    </div>`;
  modal.classList.add('active');
}

// ===== QR CODE SHARE =====
function showQR(){
  const top3=window._lastTop3;
  if(!top3||!top3.length){alert(d.alertNoResult);return}
  const d=I18N[LANG];
  const top=top3[0];
  const avatarSrc=getImage(top.type.code);
  const url='https://catpersona.pages.dev/';

  const box=document.getElementById('qrModalBox');
  box.innerHTML=`
    <button class=modal-close style=float:right onclick="document.getElementById('qrModal').classList.remove('active')">×</button>
    ${avatarSrc?`<img class=qr-avatar src="${avatarSrc}" alt="${top.type.name}">`:''}
    <div class=qr-title>${d.shareTitle}</div>
    <div class=qr-desc>${d.shareDesc}</div>
    <div class=qr-desc><strong>${top.type.code}</strong> · ${top.type.name}「${top.type.en}」</div>
    <canvas class=qr-canvas id=qrCanvas width=200 height=200></canvas>
    <p class=qr-url>${d.shareUrl}</p>`;

  document.getElementById('qrModal').classList.add('active');
  generateQR(url);
}

// Minimal QR code generator
function generateQR(text){
  const canvas=document.getElementById('qrCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const size=200;const margin=4;
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,size,size);ctx.drawImage(img,0,0,size,size);};
  img.onerror=function(){ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,size,size);ctx.fillStyle='#2C2416';ctx.font='14px monospace';ctx.textAlign='center';ctx.fillText('QR: catpersona.pages.dev',size/2,size/2-10);ctx.font='12px monospace';ctx.fillText('Scan to discover your cat persona',size/2,size/2+16);};
  img.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(text)+'&margin='+margin;
}

// ===== SHARE (legacy) =====
function shareResult(){
  showQR();
}
